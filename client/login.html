<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ReUseTech</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar" id="main-navbar">
    <div class="container">
      <div class="nav-brand">
        <h1 id="nav-logo">ReUseTech</h1>
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" id="nav-home">Home</a></li>
        <li><a href="/register" id="nav-register">Register</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login Form Section -->
  <section class="form-section" id="login-section">
    <div class="container">
      <div class="form-container">
        <h2 id="login-heading">Login to ReUseTech</h2>
        <p id="login-subtitle">Welcome back! Please login to your account.</p>
        
        <div id="login-message" class="message" style="display: none;" data-testid="login-message"></div>

        <form id="login-form" data-testid="login-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input 
              type="email" 
              id="login-email" 
              name="email" 
              class="form-input"
              placeholder="Enter your email"
              required
              data-testid="login-email"
            >
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input 
              type="password" 
              id="login-password" 
              name="password" 
              class="form-input"
              placeholder="Enter your password"
              required
              data-testid="login-password"
            >
          </div>

          <button type="submit" id="btn-login" class="btn btn-primary btn-block" data-testid="login-button">
            Login
          </button>
        </form>

        <p class="form-footer" id="login-footer">
          Don't have an account? 
          <a href="/register" id="link-register">Register here</a>
        </p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" id="main-footer">
    <div class="container">
      <p id="footer-text">&copy; 2026 ReUseTech. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
