<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ReUseTech</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar" id="main-navbar">
    <div class="container">
      <div class="nav-brand">
        <h1 id="nav-logo">ReUseTech</h1>
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" id="nav-home">Home</a></li>
        <li><a href="/login" id="nav-login">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Register Form Section -->
  <section class="form-section" id="register-section">
    <div class="container">
      <div class="form-container">
        <h2 id="register-heading">Create an Account</h2>
        <p id="register-subtitle">Join ReUseTech today!</p>
        
        <div id="register-message" class="message" style="display: none;" data-testid="register-message"></div>

        <form id="register-form" data-testid="register-form">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input 
              type="text" 
              id="register-name" 
              name="name" 
              class="form-input"
              placeholder="Enter your full name"
              required
              data-testid="register-name"
            >
          </div>

          <div class="form-group">
            <label for="register-email">Email Address</label>
            <input 
              type="email" 
              id="register-email" 
              name="email" 
              class="form-input"
              placeholder="Enter your email"
              required
              data-testid="register-email"
            >
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input 
              type="password" 
              id="register-password" 
              name="password" 
              class="form-input"
              placeholder="Enter your password (min 6 characters)"
              required
              minlength="6"
              data-testid="register-password"
            >
          </div>

          <div class="form-group">
            <label for="register-role">Account Type</label>
            <select id="register-role" name="role" class="form-input" data-testid="register-role">
              <option value="user">Regular User</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" id="btn-register" class="btn btn-primary btn-block" data-testid="register-button">
            Register
          </button>
        </form>

        <p class="form-footer" id="register-footer">
          Already have an account? 
          <a href="/login" id="link-login">Login here</a>
        </p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" id="main-footer">
    <div class="container">
      <p id="footer-text">&copy; 2026 ReUseTech. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
