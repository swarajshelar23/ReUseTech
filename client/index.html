<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReUseTech - Home</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar" id="main-navbar">
    <div class="container">
      <div class="nav-brand">
        <h1 id="nav-logo">ReUseTech</h1>
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" id="nav-home">Home</a></li>
        <li><a href="#" id="nav-products">Products</a></li>
        <li class="nav-auth" id="nav-auth-links">
          <a href="/login" id="nav-login">Login</a>
          <a href="/register" id="nav-register">Register</a>
        </li>
        <li class="nav-user" id="nav-user-links" style="display: none;">
          <a href="/dashboard" id="nav-dashboard">Dashboard</a>
          <a href="#" id="nav-logout">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="hero-section">
    <div class="container">
      <div class="hero-content">
        <h1 id="hero-title">Buy & Sell Used Electronics</h1>
        <p id="hero-subtitle">The best marketplace for pre-owned tech gadgets</p>
        <a href="/register" class="btn btn-primary" id="btn-hero-getstarted">Get Started</a>
      </div>
    </div>
  </section>

  <!-- Search & Filter Section -->
  <section class="search-section" id="search-section">
    <div class="container">
      <div class="search-bar-wrapper">
        <input 
          type="text" 
          id="search-bar" 
          class="search-input" 
          placeholder="Search products..."
          data-testid="search-input"
        >
        <button id="btn-search" class="btn btn-secondary" data-testid="search-button">Search</button>
      </div>
      
      <div class="filter-bar">
        <label for="filter-category">Category:</label>
        <select id="filter-category" data-testid="filter-category">
          <option value="All">All Categories</option>
          <option value="Smartphones">Smartphones</option>
          <option value="Laptops">Laptops</option>
          <option value="Tablets">Tablets</option>
          <option value="Cameras">Cameras</option>
          <option value="Audio">Audio</option>
          <option value="Gaming">Gaming</option>
          <option value="Wearables">Wearables</option>
          <option value="Accessories">Accessories</option>
          <option value="Other">Other</option>
        </select>

        <label for="filter-min-price">Min Price:</label>
        <input type="number" id="filter-min-price" placeholder="0" data-testid="filter-min-price">

        <label for="filter-max-price">Max Price:</label>
        <input type="number" id="filter-max-price" placeholder="10000" data-testid="filter-max-price">

        <button id="btn-apply-filter" class="btn btn-secondary" data-testid="apply-filter-button">Apply Filter</button>
        <button id="btn-clear-filter" class="btn btn-outline" data-testid="clear-filter-button">Clear</button>
      </div>
    </div>
  </section>

  <!-- Products Grid -->
  <section class="products-section" id="products-section">
    <div class="container">
      <h2 id="products-heading">Latest Products</h2>
      <div class="products-grid" id="products-grid" data-testid="products-grid">
        <!-- Products will be loaded dynamically via JavaScript -->
        <div id="loading-indicator" class="loading">Loading products...</div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" id="main-footer">
    <div class="container">
      <p id="footer-text">&copy; 2026 ReUseTech. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
